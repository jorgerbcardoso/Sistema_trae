
  <!DOCTYPE html>
  <html lang="pt-BR" class="dark" style="color-scheme: dark">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="color-scheme" content="dark" />
      <title>Sistema Presto</title>
    
    <!-- FORÇAR TEMA ESCURO ABSOLUTO E NEUTRALIZAR TEMA CLARO -->
    <style>
      :root, html, body {
        background-color: #020617 !important;
        color: #f8fafc !important;
        color-scheme: dark !important;
      }
      body {
        margin: 0;
      }
      /* Neutralizar qualquer tentativa de forçar cores claras via classes Tailwind v3/v4 */
      .bg-white, .bg-slate-50, .bg-gray-50, .bg-blue-50, .bg-slate-100, .bg-gray-100 {
        background-color: #020617 !important;
      }
      .text-slate-900, .text-slate-950, .text-gray-900, .text-black, .text-slate-800 {
        color: #f8fafc !important;
      }
      .border-slate-200, .border-gray-200, .border-slate-300 {
        border-color: #1e293b !important;
      }
    </style>
    
    <script>
      (function() {
        const doc = document.documentElement;
        doc.classList.add('dark');
        doc.classList.remove('light');
        doc.style.colorScheme = 'dark';
        
        const observer = new MutationObserver(() => {
          if (!doc.classList.contains('dark')) doc.classList.add('dark');
          if (doc.classList.contains('light')) doc.classList.remove('light');
        });
        observer.observe(doc, { attributes: true, attributeFilter: ['class'] });
      })();
    </script>
  </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
