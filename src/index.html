<!DOCTYPE html>
<html lang="pt-BR" class="dark" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Sistema Presto</title>
    
    <!-- FORÇAR TEMA ESCURO ABSOLUTO (SEM SUPORTE A LIGHT) -->
    <style>
      :root, html, body {
        background-color: #020617 !important; /* slate-950 */
        color: #f8fafc !important; /* slate-50 */
        color-scheme: dark !important;
      }
      /* Esconder qualquer elemento que force tema claro */
      .light { display: none !important; }
    </style>
    
    <script>
      (function() {
        // Bloqueio ultra-persistente do tema escuro
        function forceDarkOnly() {
          const html = document.documentElement;
          
          // 1. Garantir classes
          if (!html.classList.contains('dark')) html.classList.add('dark');
          if (html.classList.contains('light')) html.classList.remove('light');
          
          // 2. Forçar atributos de estilo e meta
          html.style.setProperty('color-scheme', 'dark', 'important');
          html.setAttribute('data-theme', 'dark');
          
          // 3. Bloquear localStorage
          localStorage.setItem('theme', 'dark');
          localStorage.setItem('presto_theme', 'dark');
        }
        
        // Execução imediata e em múltiplos eventos
        forceDarkOnly();
        window.addEventListener('DOMContentLoaded', forceDarkOnly);
        window.addEventListener('load', forceDarkOnly);
        
        // Observador de mutação para evitar que scripts externos mudem a classe
        const observer = new MutationObserver((mutations) => {
          mutations.forEach(() => {
            const html = document.documentElement;
            if (html.classList.contains('light') || !html.classList.contains('dark')) {
              forceDarkOnly();
            }
          });
        });
        
        observer.observe(document.documentElement, { 
          attributes: true, 
          attributeFilter: ['class', 'style'] 
        });

        // Intervalo de segurança (último recurso)
        setInterval(forceDarkOnly, 1000);
      })();
    </script>
    <!-- Tailwind CSS via CDN (para compatibilidade com Figma Make) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        // TEMA ÚNICO: ESCURO (SEM SUPORTE A CLASSES OU PREFERÊNCIA DE MÍDIA)
        darkMode: 'class', // Mantemos class mas a classe 'dark' já está fixa no <html>
        theme: {
          extend: {
            colors: {
              // Redefinir cores base para que o "light" se torne "dark"
              white: "#020617",
              black: "#f8fafc",
              slate: {
                50: "#0f172a",
                100: "#1e293b",
                900: "#f8fafc",
                950: "#ffffff",
              },
              gray: {
                50: "#0f172a",
                100: "#1e293b",
                900: "#f8fafc",
              },
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              destructive: {
                DEFAULT: "hsl(var(--destructive))",
                foreground: "hsl(var(--destructive-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              popover: {
                DEFAULT: "hsl(var(--popover))",
                foreground: "hsl(var(--popover-foreground))",
              },
              card: {
                DEFAULT: "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
          },
        },
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
