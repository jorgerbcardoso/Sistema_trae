<!DOCTYPE html>
<html lang="pt-BR" class="dark" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Sistema Presto</title>
    
    <!-- NUCLEAR FORCE DARK MODE (LOCKDOWN) -->
    <script>
      (function() {
        const doc = document.documentElement;
        
        // 1. Forçar classes e atributos IMEDIATAMENTE
        const forceDark = () => {
          if (!doc.classList.contains('dark')) doc.classList.add('dark');
          if (doc.classList.contains('light')) doc.classList.remove('light');
          if (doc.getAttribute('data-theme') !== 'dark') doc.setAttribute('data-theme', 'dark');
          if (doc.style.colorScheme !== 'dark') {
            doc.style.setProperty('color-scheme', 'dark', 'important');
          }
        };

        forceDark();

        // 2. Bloquear qualquer mudança de tema (MutationObserver)
        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            if (mutation.type === 'attributes' && (mutation.attributeName === 'class' || mutation.attributeName === 'style' || mutation.attributeName === 'data-theme')) {
              forceDark();
            }
          });
        });

        observer.observe(doc, { 
          attributes: true, 
          attributeFilter: ['class', 'style', 'data-theme'] 
        });

        // 3. Forçar dark mode em nível de sistema para o navegador
        const meta = document.createElement('meta');
        meta.name = 'color-scheme';
        meta.content = 'dark';
        document.head.appendChild(meta);
      })();
    </script>
    
    <style>
      /* NUCLEAR OVERRIDE: Neutralizar qualquer utilitário de cor clara */
      :root, html, body {
        background-color: #020617 !important;
        color: #f8fafc !important;
        color-scheme: dark !important;
      }

      /* Sobrescrever classes utilitárias comuns do Tailwind que trazem branco */
      .bg-white, .bg-slate-50, .bg-gray-50, .bg-zinc-50, .bg-neutral-50, 
      .bg-white\/10, .bg-white\/20, .bg-white\/50, .bg-white\/80, .bg-white\/90 {
        background-color: #020617 !important;
      }

      .text-black, .text-slate-900, .text-slate-950, .text-gray-900, .text-gray-950,
      .text-zinc-900, .text-zinc-950, .text-neutral-900, .text-neutral-950 {
        color: #f8fafc !important;
      }

      .border-white, .border-slate-200, .border-gray-200, .border-zinc-200 {
        border-color: #1e293b !important;
      }

      /* Garantir que inputs e textareas herdem o fundo escuro */
      input, textarea, select {
        background-color: #0f172a !important;
        color: #f8fafc !important;
        border-color: #1e293b !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
